services:
  postgres:
    image: postgres:16
    container_name: travel-ticket-postgres
    environment:
      POSTGRES_DB: travel_ticket
      POSTGRES_USER: travel_ticket
      POSTGRES_PASSWORD: travel_ticket
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_ticket -d travel_ticket"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: travel-ticket-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    platform: linux/amd64
    container_name: travel-ticket-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  nacos:
    image: nacos/nacos-server:v3.2.2
    platform: linux/amd64
    container_name: travel-ticket-nacos
    restart: always
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: "U2VjcmV0S2V5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5Cg=="
      NACOS_AUTH_IDENTITY_KEY: "serverIdentity"
      NACOS_AUTH_IDENTITY_VALUE: "security"
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "8080:8080"
      - "9848:9848"
    volumes:
      - nacos_logs:/home/nacos/logs
      - nacos_data:/home/nacos/data
      - nacos_conf:/home/nacos/conf
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/ns/operator/metrics || exit 1"]
      start_period: 10s
      interval: 15s
      timeout: 5s
      retries: 20
      
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: travel-ticket-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://travel-ticket-es:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  travel-ticket-service:
    image: travel-ticket-service:latest
    container_name: travel-ticket-service
    environment:
      - NACOS_SERVER_ADDR=http://travel-ticket-nacos:8848
    ports:
      - "80:80"
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  es-data:
  nacos_data:
  nacos_conf:
  nacos_logs:
