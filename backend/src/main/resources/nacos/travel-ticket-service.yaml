server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/travel_ticket?sslmode=disable
    username: travel_ticket
    password: travel_ticket
    hikari:
      maximum-pool-size: 80
      minimum-idle: 10
  data:
    redis:
      host: redis
      port: 6379
    elasticsearch:
      repositories:
        enabled: true
  elasticsearch:
    uris: http://elasticsearch:9200
  cache:
    type: redis

management:
  health:
    elasticsearch:
      enabled: true

logging:
  level:
    com.codex.travel.ticket: INFO
