server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5432}/${POSTGRES_DB:travel_ticket}?sslmode=${POSTGRES_SSL_MODE:disable}
    username: ${POSTGRES_USER:travel_ticket}
    password: ${POSTGRES_PASSWORD:travel_ticket}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:40}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
      lettuce:
        pool:
          max-active: 64
          max-idle: 16
          min-idle: 4
    elasticsearch:
      repositories:
        enabled: ${ES_ENABLED:true}
  elasticsearch:
    uris: ${ES_URIS:http://127.0.0.1:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    elasticsearch:
      enabled: ${ES_ENABLED:true}

logging:
  charset:
    console: UTF-8
  level:
    root: INFO
    com.codex.travel.ticket: INFO
    org.springframework.data.elasticsearch.client.WIRE: OFF
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
